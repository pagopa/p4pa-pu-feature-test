parameters:
  - name: env
    type: string
  - name: tag
    type: string
  - name: azureServiceConnection
    type: string
  - name: keyVaultName
    type: string
  - name: secretName
    type: string

steps:
  - script: |
      python3 --version
      pip3 --version
    displayName: "Display Python version"
  - script: |
      python3 -m pip install --user pipenv
      python3 -m pipenv sync
    displayName: "Install requirements"
  - task: AzureCLI@2
    displayName: 'Fetch PU secrets from Key Vault'
    inputs:
      azureSubscription: ${{ parameters.azureServiceConnection }}
      scriptType: 'bash'
      scriptLocation: 'inlineScript'
      inlineScript: |
        mkdir -p $(Pipeline.Workspace)/secrets
        az keyvault secret show \
          --name "${{ parameters.secretName }}" \
          --vault-name "${{ parameters.keyVaultName }}" \
          --query 'value' -o tsv > $(Pipeline.Workspace)/secrets/pu_feature_secrets.yaml

        if [ $? -ne 0 ]; then
        echo "##[error]Failed to fetch secret from Key Vault"
        exit 1
        fi

        if [ ! -s $(Pipeline.Workspace)/secrets/pu_feature_secrets.yaml ]; then
          echo "##[error]Secret file is empty"
          exit 1
        fi
  
        if ! python3 -c "import yaml; yaml.safe_load(open('$(Pipeline.Workspace)/secrets/pu_feature_secrets.yaml'))"; then
          echo "##[error]Invalid YAML format in secrets file"
          echo "File size: $(wc -c < $(Pipeline.Workspace)/secrets/pu_feature_secrets.yaml) bytes"
          echo "Line count: $(wc -l < $(Pipeline.Workspace)/secrets/pu_feature_secrets.yaml)"
          exit 1
        fi

        echo "##vso[task.setvariable variable=secretFilePath]$(Pipeline.Workspace)/secrets/pu_feature_secrets.yaml"
        echo "✅ Secrets fetched and validated successfully"

  - script: |
      python3 -m pipenv run behave --junit --junit-directory "tests/reports/behave" --tags "${{ parameters.tag }}"
    displayName: 'Run tests with Behave'
    env:
      PU_SECRETS_PATH: $(secretFilePath)
      PU_TARGET_ENV: ${{ parameters.env }}
    continueOnError: true
  - task: PublishTestResults@2
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: 'tests/reports/behave/*.xml'
      searchFolder: $(Build.SourcesDirectory)
      failTaskOnFailedTests: true
      testRunTitle: 'Feature test results: ${{ parameters.tag }}'
    continueOnError: true
  - task: Bash@3
    displayName: 'Send message on Slack'
    condition: in(variables['Agent.JobStatus'], 'SucceededWithIssues', 'Failed')
    inputs:
      targetType: 'inline'
      script: >
        curl -X POST \
          -H "Content-type: application/json" \
          --data '{"text": "*Attention: There is an error in p4pa-pu-feature-test while running the tests!*\nCheck the logs for more details $(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId) to view the results."}' \
          $(SLACK_WEBHOOK_URL)
